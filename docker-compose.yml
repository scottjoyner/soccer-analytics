services:
  neo4j:
    image: neo4j:5-community
    container_name: soccer-analytics-neo4j
    profiles: ["graph"]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${SOCCER_EDGE_NEO4J_PASSWORD:-please-change-me}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs:
