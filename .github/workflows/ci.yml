name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
      - name: Run tests
        run: pytest
      - name: Validate card helpers
        run: pytest tests/test_card_validation.py tests/test_cards.py
      - name: Video review smoke tests
        run: pytest tests/test_cli_next_video_tools.py tests/test_cli_data_integrations.py tests/test_frame_join.py tests/test_annotation_split.py tests/test_calibration_summary.py
      - name: Final data integration smoke tests
        run: pytest tests/test_annotation_audit.py tests/test_dataset_versioning.py tests/test_auto_data_card.py tests/test_object_eval.py tests/test_local_finetune_pipeline.py tests/test_cli_final_integrations.py
      - name: Review extension smoke tests
        run: pytest tests/test_correction_merge.py tests/test_object_confusion.py tests/test_local_finetune_plan.py tests/test_graph_export_dataset_payloads.py tests/test_cli_review_extensions.py
      - name: Source player promotion smoke tests
        run: pytest tests/test_correction_review_ui.py tests/test_graph_payload_files.py tests/test_promotion_gate.py tests/test_player_stats.py tests/test_raw_data_sources.py tests/test_cli_source_player_promotion.py
      - name: Run ruff
        run: ruff check src tests

  optional-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ML dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r requirements-ml.txt
          python -m pip install -e .
      - name: Run ML tests
        run: pytest tests/test_cnn_runner.py tests/test_cnn_outputs.py tests/test_cnn_review.py tests/test_cnn_training.py tests/test_torch_optional.py tests/test_temporal_training.py
